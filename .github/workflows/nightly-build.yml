name: Nightly Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * *' # 1:00 BJ Time

permissions:
  contents: write
  actions: write

jobs:
  check-repository:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ github.repository == 'Hiram-Wong/zyfun' }}
    steps:
      - name: Check if running in main repository
        run: |
          echo "Running in repository: ${{ github.repository }}"
          echo "Should run: ${{ github.repository == 'Hiram-Wong/zyfun' }}"

  cleanup-artifacts:
    needs: check-repository
    if: needs.check-repository.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Delete old artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          cutoff_ts=$(date -d "14 days ago" +%s)

          gh api repos/$REPO/actions/artifacts --paginate | \
          jq -r --argjson cutoff "$cutoff_ts" '
            .artifacts[]
            | select(.name | startswith("zyfun-nightly-"))
            | select((.created_at | fromdateiso8601) < $cutoff)
            | .id
          ' | while read -r artifact_id; do
            echo "Deleting artifact $artifact_id"
            gh api repos/$REPO/actions/artifacts/$artifact_id -X DELETE
          done

  metadata:
    needs: check-repository
    if: needs.check-repository.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.meta.outputs.date }}
      sha: ${{ steps.meta.outputs.sha }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          SHA=$(git rev-parse HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short_sha=${SHA:0:7}" >> $GITHUB_OUTPUT
          echo "date=$(TZ=Asia/Shanghai date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "Building at $SHA"

  nightly-build:
    needs:
      - check-repository
      - metadata
    if: needs.check-repository.outputs.should_run == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest, windows-11-arm, ubuntu-latest]
      fail-fast: false

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.sha }}
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: macos-latest dependencies fix
        if: matrix.os == 'macos-latest'
        run: |
          brew install python-setuptools

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Dependencies
        run: pnpm install

      - name: Prepare env file
        shell: bash
        run: cp -f .env.example .env

      - name: Generate date tag
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y rpm libevdev-dev libxtst-dev libx11-dev libxfixes-dev libwayland-dev
          pnpm build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Build Mac
        if: matrix.os == 'macos-latest'
        run: |
          pnpm build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Build Windows(x64)
        if: matrix.os == 'windows-latest'
        run: |
          pnpm build:win:x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Build Windows(arm64)
        if: matrix.os == 'windows-11-arm'
        run: |
          pnpm build:win:arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Rename artifacts with nightly format
        shell: bash
        run: |
          mkdir -p renamed-artifacts
          DATE="${{ needs.metadata.outputs.date }}"
          PREFIX="zyfun-nightly-${DATE}"

          copy_first() {
            local pattern="$1"
            local target="$2"
            local source
            source=$(find dist -name "$pattern" -type f -print -quit)
            if [ -n "$source" ]; then
              cp "$source" "renamed-artifacts/$target"
            fi
          }

          if [ "${{ matrix.os }}" == "windows-latest" ] || [ "${{ matrix.os }}" == "windows-11-arm" ]; then
            copy_first "*-x64-setup.exe" "${PREFIX}-x64-setup.exe"
            copy_first "*-arm64-setup.exe" "${PREFIX}-arm64-setup.exe"
            copy_first "*-x64-portable.exe" "${PREFIX}-x64-portable.exe"
            copy_first "*-arm64-portable.exe" "${PREFIX}-arm64-portable.exe"
          fi

          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            copy_first "*-arm64.dmg" "${PREFIX}-arm64.dmg"
            copy_first "*-x64.dmg" "${PREFIX}-x64.dmg"
          fi

          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            copy_first "*-x86_64.AppImage" "${PREFIX}-x86_64.AppImage"
            copy_first "*-arm64.AppImage" "${PREFIX}-arm64.AppImage"
            copy_first "*-amd64.deb" "${PREFIX}-amd64.deb"
            copy_first "*-arm64.deb" "${PREFIX}-arm64.deb"
            copy_first "*-x86_64.rpm" "${PREFIX}-x86_64.rpm"
            copy_first "*-arm64.rpm" "${PREFIX}-arm64.rpm"
          fi

          cp dist/latest*.yml renamed-artifacts/ 2>/dev/null || true

      - name: List files to be uploaded
        shell: bash
        run: |
          echo "Files to upload:"
          if [ -x "$(command -v tree)" ]; then
            tree renamed-artifacts
          elif [ "$RUNNER_OS" = "Windows" ]; then
            dir renamed-artifacts
          else
            ls -la renamed-artifacts
          fi
          echo "Total: $(find renamed-artifacts -type f | wc -l) files"

      - name: Upload Windows x64 setup
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: zyfun-nightly-${{ needs.metadata.outputs.date }}-x64-setup.exe
          path: renamed-artifacts/zyfun-nightly-${{ needs.metadata.outputs.date }}-x64-setup.exe
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 0

      - name: Upload Windows arm64 setup
        if: matrix.os == 'windows-11-arm'
        uses: actions/upload-artifact@v7
        with:
          name: zyfun-nightly-${{ needs.metadata.outputs.date }}-arm64-setup.exe
          path: renamed-artifacts/zyfun-nightly-${{ needs.metadata.outputs.date }}-arm64-setup.exe
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 0

      - name: Upload macOS arm64 dmg
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: zyfun-nightly-${{ needs.metadata.outputs.date }}-arm64.dmg
          path: renamed-artifacts/zyfun-nightly-${{ needs.metadata.outputs.date }}-arm64.dmg
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 0

      - name: Upload macOS x64 dmg
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: zyfun-nightly-${{ needs.metadata.outputs.date }}-x64.dmg
          path: renamed-artifacts/zyfun-nightly-${{ needs.metadata.outputs.date }}-x64.dmg
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 0

      - name: Upload Linux x86_64 AppImage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: zyfun-nightly-${{ needs.metadata.outputs.date }}-x86_64.AppImage
          path: renamed-artifacts/zyfun-nightly-${{ needs.metadata.outputs.date }}-x86_64.AppImage
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 0

      - name: Upload Linux arm64 AppImage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: zyfun-nightly-${{ needs.metadata.outputs.date }}-arm64.AppImage
          path: renamed-artifacts/zyfun-nightly-${{ needs.metadata.outputs.date }}-arm64.AppImage
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 0

      - name: Upload Linux amd64 deb
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: zyfun-nightly-${{ needs.metadata.outputs.date }}-amd64.deb
          path: renamed-artifacts/zyfun-nightly-${{ needs.metadata.outputs.date }}-amd64.deb
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 0

      - name: Upload Linux arm64 deb
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: zyfun-nightly-${{ needs.metadata.outputs.date }}-arm64.deb
          path: renamed-artifacts/zyfun-nightly-${{ needs.metadata.outputs.date }}-arm64.deb
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 0

      - name: Upload Linux x86_64 rpm
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: zyfun-nightly-${{ needs.metadata.outputs.date }}-x86_64.rpm
          path: renamed-artifacts/zyfun-nightly-${{ needs.metadata.outputs.date }}-x86_64.rpm
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 0

      - name: Upload Linux arm64 rpm
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: zyfun-nightly-${{ needs.metadata.outputs.date }}-arm64.rpm
          path: renamed-artifacts/zyfun-nightly-${{ needs.metadata.outputs.date }}-arm64.rpm
          if-no-files-found: ignore
          retention-days: 7
          compression-level: 0

  build-summary:
    needs:
      - check-repository
      - metadata
      - nightly-build
    if: always() && needs.check-repository.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out workflow scripts
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.sha }}
          fetch-depth: 0

      - name: Create summary report
        shell: bash
        env:
          BUILD_RESULT: ${{ needs.nightly-build.result }}
          BUILD_DATE: ${{ needs.metadata.outputs.date }}
          BUILD_SHA: ${{ needs.metadata.outputs.sha }}
          SHORT_SHA: ${{ needs.metadata.outputs.short_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "## Nightly Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${SHORT_SHA}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Date: \`${BUILD_DATE}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Status: \`${BUILD_RESULT}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Download: [Actions artifacts](${RUN_URL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
