name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      platform:
        description: 'Build platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - mac
          - linux
  push:
    tags:
      - v*.*.*

  pull_request_target:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: Get release tag
        id: get-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request_target" ]; then
            BRANCH="${{ github.event.pull_request.head.ref }}"
            echo "tag=${BRANCH#release/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs:
      - prepare
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ${{ fromJSON(
          github.event_name == 'push' && '["macos-latest", "windows-latest", "windows-11-arm", "ubuntu-latest"]' ||
          github.event_name == 'pull_request_target' && '["macos-latest", "windows-latest", "windows-11-arm", "ubuntu-latest"]' ||
          github.event.inputs.platform == 'all' && '["macos-latest", "windows-latest", "windows-11-arm", "ubuntu-latest"]' ||
          github.event.inputs.platform == 'linux' && '["ubuntu-latest"]' ||
          github.event.inputs.platform == 'windows' && '["windows-latest", "windows-11-arm"]' ||
          github.event.inputs.platform == 'mac' && '["macos-latest"]' ||
          '["macos-latest", "windows-latest", "windows-11-arm", "ubuntu-latest"]'
          ) }}
      fail-fast: false

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || '' }}

      - name: Set package.json version
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: macos-latest dependencies fix
        if: matrix.os == 'macos-latest'
        run: |
          brew install python-setuptools

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Dependencies
        run: pnpm install

      - name: Prepare env file
        shell: bash
        run: cp -f .env.example .env

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y rpm libevdev-dev libxtst-dev libx11-dev libxfixes-dev libwayland-dev
          pnpm build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Build Mac
        if: matrix.os == 'macos-latest'
        run: |
          pnpm build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Build Windows(x64)
        if: matrix.os == 'windows-latest'
        run: |
          pnpm build:win:x64
          mv dist/latest.yml dist/latest-win-x64.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Build Windows(arm64)
        if: matrix.os == 'windows-11-arm'
        run: |
          pnpm build:win:arm64
          mv dist/latest.yml dist/latest-win-arm64.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: zyfun-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/latest*.yml

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Merge Windows latest.yml
        if: hashFiles('dist/latest-win-x64.yml') != '' && hashFiles('dist/latest-win-arm64.yml') != ''
        shell: bash
        run: |
          set -euo pipefail

          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

          yq eval-all '
            select(fileIndex == 0) as $x64 |
            select(fileIndex == 1) as $arm |
            $x64 |
            .files = (($x64.files // []) + ($arm.files // []))
          ' dist/latest-win-x64.yml dist/latest-win-arm64.yml > dist/latest.yml
          rm -f dist/latest-win-x64.yml dist/latest-win-arm64.yml

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          draft: true
          allowUpdates: true
          makeLatest: false
          tag: ${{ needs.prepare.outputs.tag }}
          artifacts: 'dist/*.exe,dist/*.dmg,dist/*.AppImage,dist/*.snap,dist/*.deb,dist/*.rpm,dist/*.tar.gz,dist/latest*.yml'
          token: ${{ secrets.GITHUB_TOKEN }}
